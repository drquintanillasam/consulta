<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Código Infarto UMF 73</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --surface: #1a1f2e;
      --border: #2e3650;
      --text: #dde2ec;
      --muted: #5a6480;
      --accent: #e53e3e;
      --green: #22863a;
      --input-bg: #0d1017;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-columns: 3fr 2fr;
      height: 100vh;
      overflow: hidden;
      font-size: 0.85rem;
    }

    /* ---- COLUMNA FORMULARIO ---- */
    .form {
      overflow-y: auto;
      padding: 0.9rem 1.1rem;
      border-right: 1px solid var(--border);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    h1 {
      font-size: 1rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.15rem;
    }

    .subtitle {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 0.8rem;
    }

    .section-title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.2rem;
      margin: 0.7rem 0 0.45rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem 0.7rem;
    }

    .span2 { grid-column: span 2; }

    label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.18rem;
    }

    input, textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.82rem;
      font-family: inherit;
      padding: 0.3rem 0.5rem;
      resize: none;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea { min-height: 44px; }

    .sv { grid-template-columns: repeat(5, 1fr); }

    .toggle-row { display: flex; gap: 0.3rem; }

    .tog {
      flex: 1;
      padding: 0.3rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
    }

    .tog.si { background: #14532d; border-color: #16a34a; color: #bbf7d0; }
    .tog.no { background: #7f1d1d; border-color: var(--accent); color: #fecaca; }

    .trat-info {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.35rem 0.5rem;
      margin-bottom: 0.4rem;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--text);
      padding: 0.1rem 0;
    }

    .check-row input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    /* ---- COLUMNA OUTPUT ---- */
    .output {
      display: flex;
      flex-direction: column;
      padding: 0.9rem 1rem;
      gap: 0.5rem;
    }

    .output-title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--accent);
    }

    .btn-row {
      display: flex;
      gap: 0.4rem;
    }

    .btn {
      padding: 0.38rem 0.85rem;
      border-radius: 5px;
      border: none;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }

    .btn-gen   { background: var(--accent); color: #fff; }
    .btn-copy  { background: #1e40af; color: #fff; }
    .btn-clear { background: #2e3650; color: var(--text); }

    #output {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: #a3e635;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      padding: 0.6rem 0.75rem;
      resize: none;
      white-space: pre;
      overflow-y: auto;
    }

    .copy-ok {
      font-size: 0.7rem;
      color: #4ade80;
      min-height: 1rem;
    }
  </style>
</head>
<body>

<!-- FORMULARIO -->
<div class="form">
  <h1>&#9829; Código Infarto UMF 73</h1>
  <p class="subtitle">Formato de captura para activación de código infarto</p>

  <div class="section-title">Datos Generales</div>
  <div class="grid">
    <div>
      <label>Ambulancia</label>
      <div class="toggle-row" id="t-ambulancia">
        <button class="tog si" data-v="SI" onclick="tog('ambulancia','SI')">SI</button>
        <button class="tog"    data-v="NO" onclick="tog('ambulancia','NO')">NO</button>
      </div>
    </div>
    <div>
      <label>Paciente Vigente</label>
      <div class="toggle-row" id="t-vigente">
        <button class="tog si" data-v="SI" onclick="tog('vigente','SI')">SI</button>
        <button class="tog"    data-v="NO" onclick="tog('vigente','NO')">NO</button>
      </div>
    </div>
    <div class="span2">
      <label>Nombre</label>
      <input type="text" id="nombre" placeholder="Nombre completo del paciente">
    </div>
    <div>
      <label>NSS</label>
      <input type="text" id="nss" placeholder="Número de Seguridad Social">
    </div>
    <div>
      <label>Edad</label>
      <input type="number" id="edad" placeholder="Años" min="0" max="150">
    </div>
  </div>

  <div class="section-title">Motivo y Antecedentes</div>
  <div class="grid">
    <div>
      <label>Motivo de Consulta</label>
      <textarea id="motivo" placeholder="Motivo..."></textarea>
    </div>
    <div>
      <label>Horas de Evolución Aprox.</label>
      <input type="text" id="horas" placeholder="Ej: 2 horas, 45 min">
    </div>
    <div>
      <label>AHF</label>
      <textarea id="ahf" placeholder="Antecedentes heredofamiliares..."></textarea>
    </div>
    <div>
      <label>APP</label>
      <textarea id="app" placeholder="HAS, DM2, cardiopatía..."></textarea>
    </div>
    <div class="span2">
      <label>Padecimiento Actual</label>
      <textarea id="padecimiento" style="min-height:52px" placeholder="Descripción del padecimiento actual..."></textarea>
    </div>
  </div>

  <div class="section-title">Signos Vitales</div>
  <div class="grid sv">
    <div><label>TA</label><input type="text" id="ta" placeholder="120/80"></div>
    <div><label>FC</label><input type="text" id="fc" placeholder="80 lpm"></div>
    <div><label>FR</label><input type="text" id="fr" placeholder="18 rpm"></div>
    <div><label>TEMP</label><input type="text" id="temp" placeholder="36.5°C"></div>
    <div><label>Sat O₂</label><input type="text" id="sat" placeholder="98%"></div>
  </div>

  <div class="section-title">Exploración y ECG</div>
  <div class="grid">
    <div>
      <label>EF (Exploración Física)</label>
      <textarea id="ef" placeholder="Hallazgos..."></textarea>
    </div>
    <div>
      <label>ECG</label>
      <textarea id="ecg" placeholder="Hallazgos electrocardiográficos..."></textarea>
    </div>
  </div>

  <div class="section-title">Tratamiento Otorgado</div>
  <div class="trat-info">2 VÍAS IZQ PERIFÉRICAS, TRICOTOMIA INGUINAL BILATERAL, OXÍGENO Y BATA DE HOSPITAL. METOPROLOL 75MG</div>
  <div class="grid">
    <div>
      <label class="check-row">
        <input type="checkbox" id="heparina">
        HEPARINA 5000 SI ES ACEPTADO
      </label>
    </div>
    <div>
      <label>Tratamiento adicional</label>
      <textarea id="trat-extra" placeholder="Indicaciones adicionales..."></textarea>
    </div>
  </div>
</div>

<!-- OUTPUT -->
<div class="output">
  <p class="output-title">&#128203; Texto Generado</p>
  <div class="btn-row">
    <button class="btn btn-gen"   onclick="generar()">&#9656; Generar</button>
    <button class="btn btn-copy"  onclick="copiar()">Copiar</button>
    <button class="btn btn-clear" onclick="limpiar()">&#8635; Limpiar</button>
  </div>
  <p class="copy-ok" id="copy-ok"></p>
  <textarea id="output" readonly placeholder="Presiona 'Generar'..."></textarea>
</div>

<script>
  const state = { ambulancia: 'SI', vigente: 'SI' };

  function tog(field, val) {
    state[field] = val;
    document.getElementById('t-' + field).querySelectorAll('.tog').forEach(b => {
      b.className = 'tog' + (b.dataset.v === val ? (val === 'SI' ? ' si' : ' no') : '');
    });
  }

  const g = id => document.getElementById(id).value.trim();

  function generar() {
    const lines = [
      'FORMATO DE CÓDIGO INFARTO UMF 73',
      'CONTAMOS CON AMBULANCIA: ' + state.ambulancia,
      'PACIENTE: VIGENTE: ' + state.vigente,
      'NOMBRE: ' + g('nombre'),
      'NSS: ' + g('nss'),
      'EDAD: ' + g('edad'),
      'MOTIVO DE CONSULTA',
      g('motivo'),
      'HORAS DE EVOLUCIÓN APROXIMADAMENTE',
      g('horas'),
      'AHF: ' + g('ahf'),
      'APP: ' + g('app'),
      'PADECIMIENTO ACTUAL: ' + g('padecimiento'),
      'SV:TA: ' + g('ta') + '    FC: ' + g('fc') + '    FR: ' + g('fr') + '    TEMP: ' + g('temp') + '     , SATURACIÓN: ' + g('sat'),
      'EF: ' + g('ef'),
      'ECG : ' + g('ecg'),
      'TRATAMIENTO OTORGADO:',
      '2 VÍAS IZQ PERIFÉRICAS, TRICOTOMIA INGUINAL BILATERAL, OXÍGENO Y BATA DE HOSPITAL.  METOPROLOL 75MG',
    ];
    if (document.getElementById('heparina').checked) lines.push('HEPARINA 5000 SI ES ACEPTADO');
    const extra = g('trat-extra');
    if (extra) lines.push(extra);
    document.getElementById('output').value = lines.join('\n');
  }

  function copiar() {
    const out = document.getElementById('output');
    if (!out.value) return;
    navigator.clipboard.writeText(out.value).then(() => {
      const el = document.getElementById('copy-ok');
      el.textContent = '✓ Copiado';
      setTimeout(() => el.textContent = '', 2000);
    }).catch(() => { out.select(); document.execCommand('copy'); });
  }

  function limpiar() {
    ['nombre','nss','edad','motivo','horas','ahf','app','padecimiento',
     'ta','fc','fr','temp','sat','ef','ecg','trat-extra','output'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('heparina').checked = false;
    document.getElementById('copy-ok').textContent = '';
    tog('ambulancia', 'SI');
    tog('vigente', 'SI');
  }
</script>
</body>
</html>
